      description: 计算机视觉CCF-A类会议重要论文检索
      enabled: true
      paper_sources:
        - arxiv
      keywords:
        - keyword: vision transformer
          keyword_cn: 视觉Transformer
          query: Vision Transformer ViT important paper computer vision
        - keyword: detection transformer
          keyword_cn: 检测Transformer
          query: DETR transformer for object detection paper
        - keyword: masked autoencoder
          keyword_cn: 掩码自编码器
          query: Masked Autoencoder MAE visual representation learning
        - keyword: contrastive language-image pretraining
          keyword_cn: 对比语言-图像预训练
          query: CLIP model connecting text and images
        - keyword: self-supervised vision transformer
          keyword_cn: 自监督视觉Transformer
          query: self-supervised learning with vision transformers
        - keyword: generative adversarial network
          keyword_cn: 生成对抗网络
          query: generative adversarial networks for computer vision at CCF-A venues
      intent_queries:
        - query: landmark papers in computer vision after the introduction of Transformer
          query_cn: Transformer引入后计算机视觉领域的里程碑论文
          enabled: true
          source: manual
          note: ''
